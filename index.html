<!DOCTYPE html>
<html>
<head>

<style>

    display:flex;

    height:100vh;
}

.container{
    background:#1b1f27;
    padding:40px;
    border-radius:10px;
    width:320px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    background:#2a2f3a;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#00a2ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0086d1;
}
</style>
</head>

</html>
